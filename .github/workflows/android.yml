name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'app.js'
      - 'style.css'
      - 'manifest.webmanifest'
      - 'icons/**'
      - 'package.json'
      - 'capacitor.config.json'
      - 'build-web.js'
      - 'patch-android.js'
      - '.github/workflows/android.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform & build-tools
        run: |
          yes | sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools" >/dev/null || true

      - name: Install dependencies
        run: npm install

      - name: Copy web assets to www/
        run: npm run build:web

      - name: Add Android platform
        run: npx cap add android

      - name: Patch AndroidManifest (permissions)
        run: node patch-android.js

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: more-derech-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
