name: Build Signed AAB (Play Store)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform & build-tools
        run: |
          yes | sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools" >/dev/null || true

      - name: Install dependencies
        run: npm install

      - name: Copy web assets to www/
        run: npm run build:web

      - name: Add Android platform
        run: npx cap add android

      - name: Patch AndroidManifest (permissions)
        run: node patch-android.js

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/upload.keystore"
          echo "KEYSTORE_PATH=$RUNNER_TEMP/upload.keystore" >> "$GITHUB_ENV"

      - name: Inject signing config
        run: node patch-android-signing.js

      - name: Build signed AAB
        env:
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew bundleRelease --no-daemon --stacktrace

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: more-derech-aab
          path: android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
